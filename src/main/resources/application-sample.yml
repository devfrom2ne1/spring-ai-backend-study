spring:
  application:
    name: lesson
  # vector config 예외처리
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  # 데이터베이스 연결 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/sparta
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA 및 Hibernate 설정
  jpa:
    hibernate:
      # ddl-auto: 애플리케이션 실행 시 스키마(테이블) 처리 전략
      # none: 아무 작업도 하지 않음 (운영 환경 추천)
      # create: 기존 테이블 삭제 후 다시 생성
      # update: 변경된 부분만 반영
      ddl-auto: none
    properties:
      hibernate:
        # postgreSQL 버전에 맞는 Dialect(방언) 설정
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway 설정
  flyway:
    enabled: true # Flyway 활성화
    locations: classpath:db/migration # 마이그레이션 파일 위치 지정
  ai:
    openai:
      # 1. API 키: Google AI Studio에서 발급받은 키를 입력합니다.
      # ${GOOGLE_AI_GEMINI_API_KEY}
      # api-key: GOOGLE_AI_GEMINI_API_KEY
      api-key: ${OPENAI_API_KEY}
      embedding:
        base-url: https://generativelanguage.googleapis.com/v1beta/openai/
        options:
          model: gemini-embedding-001
      chat:
        # 2. Base URL: Google Gemini가 제공하는 OpenAI 호환 API 주소입니다.
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        options:
          # 모델명: 현재 가장 최신/경량 모델인 gemini-2.0-flash-lite 등을 지정합니다.
          model: "gemini-2.5-flash-lite"
          # 온전성(Temperature): 0.0은 가장 보수적이고 사실적인 답변을 생성합니다.
          # (분석, 요약, 데이터 추출에 최적화된 설정)
          temperature: 0.7
          # 최대 토큰 수: AI가 생성할 답변의 최대 길이를 제한합니다.
          max-tokens: 4096
        # 4. 엔드포인트 경로: 대화형 API를 호출하기 위한 표준 경로입니다.
        completions-path: "/chat/completions"

    # --- # --- pgvector 설정 --- 설정 ---
#    ollama:
#      # Ollama 서버 주소 (도커 포트 포워딩 11434 확인)
#      base-url: http://localhost:11434
#      chat:
#        options:
#          # 우리가 설치하고 테스트한 모델명
#          model: qwen2.5:1.5b
#          # 창의성 조절 (0.7은 일반적인 대화에 적합)
#          temperature: 0.7
#
#          # 3. 샘플링 제어 (Top-K, Top-P) - 방금 학습한 내용!
#          # 확률 상위 40개 후보군으로 제한
#          top-k: 40
#          # 누적 확률 90% 이내의 단어만 선택
#          top-p: 0.9
#
#          # 4. 답변 길이 및 품질 제어
#          # 답변의 최대 토큰(단어 조각) 수를 제한 (너무 짧으면 답변이 끊김)
#          num-predict: 10000
#          # 동일한 문구 반복을 방지하는 정도 (1.1 이상 권장)
#          repeat-penalty: 1.1

    # --- pgvector 설정 ---
    vectorstore:
      pgvector:
        initialize-schema: false          # 직접 SQL로 테이블을 만들었으므로 false 권장
        dimensions: 3072                  # 임베딩 모델 최적화 차원
        distance-type: COSINE_DISTANCE    # 유사도 계산 방식 (cosine, l2, inner_product)
        index-type: hnsw                  # 고속 검색을 위한 인덱스 방식

# 로깅 레벨 설정
logging:
  level:
    # Hibernate가 실행하는 SQL 쿼리를 DEBUG 레벨로 로그에 출력
    org.hibernate.SQL: DEBUG

# 내장 웹 서버 설정
server:
  port: 8080

# Swagger UI 설정 (Springdoc)
springdoc:
  swagger-ui:
    enabled: true